<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travels - My ALEbum</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body class="page-library">
    <header class="site-header site-header-library">
        <div class="header-inner header-library">
            <div class="header-branding">
                <div class="logo-box">
                    <img src="static/img/logo.png" class="site-logo" alt="My ALEbum Logo">
                </div>
                <div class="header-copy">
                    <h1 class="site-title site-title-library">Travels</h1>
                    <p class="site-subtitle">Around the world</p>
                </div>
            </div>
            <a class="nav-btn" href="upload-album-2.html">Add picture</a>
        </div>
    </header>

    <main class="site-main album-page">
        <section class="album-hero">
            <div>
                <h2>Your album photos</h2>
                <p>Photos shared in this album</p>
            </div>
            <a class="cta" href="upload-album-2.html">Upload photo</a>
        </section>

        <div class="album-grid">
            <article class="photo-card">
                <div class="photo-placeholder" style="background: linear-gradient(135deg, #ffe0e6, #e6f0ff);">
                    <span style="color: white; font-size: 24px;">✈️</span>
                </div>
                <p>Airport</p>
                <small>Sample photo</small>
            </article>

            <article class="photo-card">
                <div class="photo-placeholder" style="background: linear-gradient(135deg, #f0e6ff, #e6ffe0);">
                    <span style="color: white; font-size: 24px;">🗽</span>
                </div>
                <p>Landmark</p>
                <small>Sample photo</small>
            </article>

            <article class="photo-card">
                <div class="photo-placeholder" style="background: linear-gradient(135deg, #ffe6d6, #d6ffe6);">
                    <span style="color: white; font-size: 24px;">🏖️</span>
                </div>
                <p>Beach</p>
                <small>Sample photo</small>
            </article>
        </div>

        <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
            <a href="index.html" style="color: #b86b73; text-decoration: none; font-weight: bold;">← Back to albums</a>
        </div>
    </main>

</body>
</html>
