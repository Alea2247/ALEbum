<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Album - My ALEbum</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body class="page-library">
    <header class="site-header site-header-library">
        <div class="header-inner header-library">
            <div class="header-branding">
                <div class="logo-box">
                    <img src="static/img/logo.png" class="site-logo" alt="My ALEbum Logo">
                </div>
                <div class="header-copy">
                    <h1 class="site-title site-title-library">Create Album</h1>
                    <p class="site-subtitle">Start a new shared space</p>
                </div>
            </div>
        </div>
    </header>

    <main class="site-main upload-page">
        <section class="upload-card" style="max-width: 600px;">
            <h2>Create a new album</h2>
            <p>Give your album a name and start sharing photos.</p>

            <form class="upload-form" data-create-album-form>
                <input type="text" name="album-name" placeholder="Album name" required>
                <label class="cover-picker">
                    <span>Add a cover image</span>
                    <input type="file" name="cover-image" accept="image/*" capture="environment">
                </label>
                <button type="submit">Create album</button>
            </form>

            <p class="cover-hint">Choose from your gallery or folders, or take a new photo on a phone or tablet.</p>

            <p class="album-message" data-form-status></p>

            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: #b86b73; text-decoration: none; font-weight: bold;">← Back</a>
            </div>
        </section>
    </main>

    <script src="static/app.js" defer></script>
</body>
</html>
