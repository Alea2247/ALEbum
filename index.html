<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albums - My ALEbum</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body class="page-library">

    <header class="site-header site-header-library">
        <div class="header-inner header-library">
            <div class="header-branding">
                <div class="logo-box">
                    <img src="static/img/logo.png" class="site-logo" alt="My ALEbum Logo">
                </div>
                <div class="header-copy">
                    <h1 class="site-title site-title-library">Your albums</h1>
                    <p class="site-subtitle">Open an album or create a new one.</p>
                </div>
            </div>
        </div>
    </header>

    <main class="site-main albums-dashboard">
        <section class="albums-grid">
            <a class="album-tile create-tile" href="create-album.html">
                <span class="album-plus">+</span>
                <span class="album-tile-title">Create new album</span>
                <span class="album-tile-text">Start a shared album</span>
            </a>
        </section>
    </main>

</body>
</html>
