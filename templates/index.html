<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My ALEbum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <div class="logo-box">
                <img src="{{ url_for('static', filename='img/logo.png') }}" class="site-logo" alt="My ALEbum Logo">
            </div>
            <h1 class="site-title">My ALEbum</h1>
            <nav class="site-nav">
                <a class="nav-btn" href="{{ url_for('login') }}">Login</a>
                <a class="nav-btn secondary" href="{{ url_for('register') }}">Register</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <section class="hero">
            <img src="{{ url_for('static', filename='img/main.jpg') }}" class="hero-image">
        </section>

        <section class="about">
            <div class="about-card">
                <h2 class="about-title">About Us</h2>
                <p class="about-text">We make it simple to collect and share memories. Upload photos, invite others, and enjoy.</p>

                <p class="about-actions">
                    <a class="cta" href="{{ url_for('create_album') }}">Create Your First Album</a>
                    <a class="cta secondary" href="#">How It Works</a>
                </p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-left">© {{"%d"|format(2026)}} My ALEbum - All Rights Reserved</div>
            <div class="footer-center">
                <a href="#">Terms of Service</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Contact</a>
            </div>
            <div class="footer-right">
                <a class="social" href="#">IG</a>
                <a class="social" href="#">P</a>
                <a class="social" href="#">F</a>
            </div>
        </div>
    </footer>

</body>
</html>
