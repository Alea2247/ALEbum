<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload photo - My ALEbum</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body class="page-library">
    <header class="site-header site-header-library">
        <div class="header-inner header-library">
            <div class="header-branding">
                <div class="logo-box">
                    <img src="static/img/logo.png" class="site-logo" alt="My ALEbum Logo">
                </div>
                <div class="header-copy">
                    <h1 class="site-title site-title-library">Add to Album</h1>
                    <p class="site-subtitle">Travels</p>
                </div>
            </div>
            <a class="nav-btn secondary" href="album-2.html">Back to album</a>
        </div>
    </header>

    <main class="site-main upload-page">
        <section class="upload-card">
            <h2>Add a picture</h2>
            <p>Choose a photo from your gallery or browse folders on your device.</p>

            <form class="upload-form" onsubmit="handleUpload(event)">
                <label class="file-picker">
                    <span>Choose image</span>
                    <input type="file" name="image" accept="image/*" required>
                </label>
                <input type="text" name="description" placeholder="Photo description">
                <button type="submit">Upload photo</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="album-2.html" style="color: #b86b73; text-decoration: none; font-weight: bold;">← Back to album</a>
            </div>
        </section>
    </main>

    <script>
        function handleUpload(event) {
            event.preventDefault();
            const file = event.target.image.files[0];
            const description = event.target.description.value;
            if (file) {
                alert(`Photo "${file.name}" selected!\n\nNote: This is a static HTML site. To permanently store photos, you would need a backend server.`);
            }
            event.target.reset();
        }
    </script>
</body>
</html>
